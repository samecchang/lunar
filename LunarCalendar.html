<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公曆農曆月曆</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #f8f6f1 0%, #e9dfd3 50%, #d7c7b5 100%);
      --panel: #ffffffee;
      --accent: #8b4513;
      --muted: #6b6b6b;
      --border: #d2c6b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }
    .calendar {
      width: min(1200px, 95vw);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.15);
      padding: 20px;
      backdrop-filter: blur(6px);
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .controls-left { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .controls-right { display: flex; gap: 8px; align-items: center; }
    select, button {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: white;
      font-size: 15px;
    }
    button {
      cursor: pointer;
      background: var(--accent);
      color: white;
      border: none;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(0,0,0,0.15); }
    button:active { transform: translateY(0); box-shadow: none; }
    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .weekday {
      text-align: center;
      font-weight: 700;
      color: var(--muted);
      padding: 6px 0;
    }
    .cell {
      min-height: 120px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: inset 0 0 0 1px #f5f0e8;
    }
    .day {
      font-size: 28px;
      font-weight: 700;
      color: #2b2b2b;
    }
    .lunar {
      font-size: 14px;
      color: var(--accent);
    }
    .today {
      border-color: #c77c38;
      box-shadow: 0 0 0 2px rgba(199,124,56,0.25);
    }
  </style>
</head>
<body>
  <div class="calendar" aria-label="公曆與農曆月曆" id="calendar">
    <div class="controls">
      <div class="controls-left">
        <button id="prevYear">« 年</button>
        <button id="prevMonth">‹ 月</button>
        <select id="year"></select>
        <select id="month"></select>
        <button id="nextMonth">月 ›</button>
        <button id="nextYear">年 »</button>
      </div>
      <div class="controls-right">
        <button id="today">今天</button>
      </div>
    </div>
    <div class="grid" id="weekdays"></div>
    <div class="grid" id="days"></div>
  </div>

  <script>
    // Lunar data and conversion (valid for 1900-2100)
    const lunarInfo = [
      0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
      0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
      0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
      0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
      0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
      0x06ca0,0x0b550,0x15355,0x04da0,0x0a5d0,0x14573,0x052d0,0x0a9a8,0x0e950,0x06aa0,
      0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
      0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,
      0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
      0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0,
      0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,
      0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
      0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
      0x05aa0,0x076a3,0x096d0,0x04bd7,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
      0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,
      0x14b63
    ];

    const lunarMonthNames = ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","臘月"];
    const lunarDayNames = [
      "初一","初二","初三","初四","初五","初六","初七","初八","初九","初十",
      "十一","十二","十三","十四","十五","十六","十七","十八","十九","二十",
      "廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"
    ];

    function lYearDays(y){
      let sum=348;
      for(let i=0x8000;i>0x8;i>>=1) sum += (lunarInfo[y-1900] & i)?1:0;
      return sum + leapDays(y);
    }
    function leapMonth(y){ return lunarInfo[y-1900] & 0xf; }
    function leapDays(y){ return leapMonth(y)? ((lunarInfo[y-1900] & 0x10000)?30:29) : 0; }
    function monthDays(y,m){ return (lunarInfo[y-1900] & (0x10000>>m))?30:29; }

    function solarToLunar(y,m,d){
      // m: 1-12
      const baseDate = new Date(1900,0,31);
      const objDate = new Date(y, m-1, d);
      let offset = Math.floor((objDate - baseDate)/86400000);

      let lunarYear, lunarMonth, lunarDay, isLeap=false;
      for(lunarYear=1900; lunarYear<=2100 && offset>0; lunarYear++){
        const days = lYearDays(lunarYear);
        offset -= days;
      }
      if(offset<0){ offset += lYearDays(--lunarYear); }

      const leap = leapMonth(lunarYear);
      for(lunarMonth=1; lunarMonth<=12 && offset>=0; lunarMonth++){
        let days = monthDays(lunarYear, lunarMonth);
        if(leap && lunarMonth===leap+1 && !isLeap){
          lunarMonth--;
          days = leapDays(lunarYear);
          isLeap = true;
        } else {
          isLeap = false;
        }
        offset -= days;
        if(!isLeap && lunarMonth===leap+1) isLeap = false;
      }
      offset += monthDays(lunarYear, lunarMonth- (offset<0?1:0));
      lunarDay = offset + 1;

      return { lunarYear, lunarMonth: lunarMonth-1, lunarDay, isLeap };
    }

    function lunarText(l){
      const monthName = (l.isLeap?"閏":"") + lunarMonthNames[(l.lunarMonth+11)%12];
      const dayName = lunarDayNames[l.lunarDay-1] || "";
      return `${monthName}${dayName}`;
    }

    const calendarEl = document.getElementById('calendar');
    const weekdays = ["日","一","二","三","四","五","六"];
    const weekdaysEl = document.getElementById('weekdays');
    weekdays.forEach(w => {
      const div = document.createElement('div');
      div.className = 'weekday';
      div.textContent = `週${w}`;
      weekdaysEl.appendChild(div);
    });

    const yearSel = document.getElementById('year');
    const monthSel = document.getElementById('month');
    const daysEl = document.getElementById('days');
    const now = new Date();

    function requestFullscreen(el){
      const target = el || document.documentElement;
      const fn = target.requestFullscreen || target.webkitRequestFullscreen || target.msRequestFullscreen;
      if(fn) fn.call(target);
    }

    calendarEl.addEventListener('dblclick', ()=>{
      if(document.fullscreenElement) return;
      requestFullscreen(document.documentElement);
    });
    for(let y=1900; y<=2100; y++){
      const opt = document.createElement('option');
      opt.value = y; opt.textContent = `${y} 年`;
      yearSel.appendChild(opt);
    }
    for(let m=1; m<=12; m++){
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = `${m} 月`;
      monthSel.appendChild(opt);
    }
    yearSel.value = now.getFullYear();
    monthSel.value = now.getMonth()+1;

    function render(y, m){
      daysEl.innerHTML = '';
      const first = new Date(y, m-1, 1);
      const startWeek = first.getDay();
      const daysInMonth = new Date(y, m, 0).getDate();
      const today = new Date();

      for(let i=0; i<startWeek; i++){
        const filler = document.createElement('div');
        filler.className = 'cell';
        daysEl.appendChild(filler);
      }
      for(let d=1; d<=daysInMonth; d++){
        const cell = document.createElement('div');
        cell.className = 'cell';
        const day = document.createElement('div');
        day.className = 'day';
        day.textContent = d;
        const lunar = solarToLunar(y, m, d);
        const lunarDiv = document.createElement('div');
        lunarDiv.className = 'lunar';
        lunarDiv.textContent = lunarText(lunar);
        cell.appendChild(day);
        cell.appendChild(lunarDiv);

        if(y===today.getFullYear() && m===today.getMonth()+1 && d===today.getDate()){
          cell.classList.add('today');
        }
        daysEl.appendChild(cell);
      }
    }

    function updateFromControls(){
      const y = parseInt(yearSel.value,10);
      const m = parseInt(monthSel.value,10);
      render(y,m);
    }

    document.getElementById('prevMonth').onclick = ()=>{
      let y = parseInt(yearSel.value,10);
      let m = parseInt(monthSel.value,10) -1;
      if(m<1){ m=12; y--; }
      yearSel.value = y; monthSel.value = m; updateFromControls();
    };
    document.getElementById('nextMonth').onclick = ()=>{
      let y = parseInt(yearSel.value,10);
      let m = parseInt(monthSel.value,10) +1;
      if(m>12){ m=1; y++; }
      yearSel.value = y; monthSel.value = m; updateFromControls();
    };
    document.getElementById('prevYear').onclick = ()=>{ yearSel.value = parseInt(yearSel.value,10)-1; updateFromControls(); };
    document.getElementById('nextYear').onclick = ()=>{ yearSel.value = parseInt(yearSel.value,10)+1; updateFromControls(); };
    document.getElementById('today').onclick = ()=>{
      yearSel.value = now.getFullYear();
      monthSel.value = now.getMonth()+1;
      updateFromControls();
    };
    yearSel.onchange = updateFromControls;
    monthSel.onchange = updateFromControls;

    updateFromControls();
  </script>
</body>
</html>
